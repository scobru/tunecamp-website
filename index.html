<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tunecamp — Explore the Network</title>
    <link rel="icon" type="image/svg+xml" href="tunecamp.svg" />
    <meta name="description"
        content="Explore the Tunecamp network — discover instances and stream tracks published by independent artists across the open federation." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
        crossorigin="anonymous" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css" />
    <style type="text/tailwindcss">
        @theme {
        --color-primary: #8b5cf6;
        --color-primary-hover: #a78bfa;
        --color-bg-base: #050505;
        --color-bg-surface: #111111;
        --color-bg-surface-alt: #1a1a1a;
        --color-text-base: #ffffff;
        --color-text-muted: #a3a3a3;
        --font-sans: "Inter", sans-serif;
        --font-display: "Outfit", sans-serif;
      }
      body {
        @apply bg-bg-base text-text-base font-sans antialiased selection:bg-primary/30;
      }
    </style>
    <style>
      .track-tile { cursor: pointer; display: flex; flex-direction: column; gap: 0.5rem; }
      .track-tile .cover {
        aspect-ratio: 1 / 1; width: 100%; border-radius: 0.75rem; overflow: hidden;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.875rem; color: rgba(255,255,255,0.2); position: relative; transition: all 0.3s;
      }
      .track-tile:hover .cover { border-color: rgba(139,92,246,0.5); }
      .track-tile.playing .cover { border-color: #8b5cf6; box-shadow: 0 0 0 2px rgba(139,92,246,0.4); }
      .track-tile .cover .overlay { opacity: 0; transition: opacity 0.3s; }
      .track-tile:hover .cover .overlay { opacity: 1; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>

<body class="min-h-screen flex flex-col relative pb-28">
    <!-- Top Nav -->
    <nav class="sticky top-0 left-0 w-full z-40 bg-black/70 backdrop-blur-lg border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center gap-6">
            <a href="index.html" class="flex items-center gap-2 font-display font-bold text-lg shrink-0">
                <img src="tunecamp.svg" alt="Tunecamp" class="w-7 h-7" /> Tunecamp
            </a>
            <div class="relative flex-1 max-w-md hidden sm:block">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-text-muted text-sm"></i>
                <input type="text" id="searchInput" placeholder="Search tracks and artists" oninput="filterTracks()"
                    class="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-primary/50 placeholder-text-muted" />
            </div>
            <div class="flex items-center gap-5 text-sm font-medium ml-auto">
                <a href="community.html" class="text-text-muted hover:text-white transition-colors">Community</a>
                <a href="about.html" class="text-text-muted hover:text-white transition-colors">About</a>
                <a href="https://github.com/scobru/tunecamp" class="text-text-muted hover:text-white transition-colors"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto w-full px-6 py-8 flex-1">
        <!-- Status + intro -->
        <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-8">
            <div>
                <h1 class="font-display text-3xl md:text-4xl font-extrabold tracking-tight mb-1">Explore the network</h1>
                <p class="text-text-muted">Tracks published across the Tunecamp federation. Click any to play.</p>
            </div>
            <div class="flex items-center gap-3 px-4 py-2 bg-white/5 rounded-full border border-white/10 text-xs font-medium shrink-0">
                <span id="statusDot" class="w-2 h-2 rounded-full bg-red-500"></span>
                <span id="statusText" class="text-text-muted">Connecting…</span>
                <span class="text-white/30">·</span>
                <span id="trackCount" class="text-white">-</span> tracks
            </div>
        </div>

        <!-- Instances strip -->
        <section class="mb-10">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-display text-lg font-bold">Instances</h2>
                <a href="community.html" class="text-sm text-primary hover:underline">View directory →</a>
            </div>
            <div id="instancesStrip" class="flex gap-3 overflow-x-auto pb-2">
                <div class="text-text-muted text-sm py-4">Scanning the network…</div>
            </div>
        </section>

        <!-- Artist filter -->
        <div class="flex items-center gap-3 mb-6">
            <select id="artistFilter" onchange="filterTracks()"
                class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-primary/50 text-white">
                <option value="" class="bg-bg-surface">All artists</option>
            </select>
            <select id="genreFilter" onchange="filterTracks()"
                class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-primary/50 text-white">
                <option value="" class="bg-bg-surface">All genres</option>
            </select>
            <button onclick="shufflePlay()" title="Shuffle play"
                class="bg-primary/20 text-primary border border-primary/30 rounded-xl px-4 py-2 text-sm hover:bg-primary/30 transition-colors">
                <i class="fas fa-random mr-1"></i> Shuffle
            </button>
        </div>

        <!-- Tracks grid -->
        <section>
            <h2 class="font-display text-lg font-bold mb-4">Latest tracks</h2>
            <div id="tracksGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5">
                <div class="col-span-full py-20 text-center text-text-muted">
                    <i class="fas fa-circle-notch fa-spin text-3xl text-primary/50 mb-3"></i>
                    <p>Loading tracks from the community…</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Player Bar -->
    <div class="fixed bottom-0 left-0 w-full bg-white/5 backdrop-blur-2xl border-t border-white/10 px-6 py-3 z-50">
        <div class="max-w-7xl mx-auto flex items-center gap-4">
            <div class="flex items-center gap-3 w-1/3 min-w-0">
                <div id="miniCover" class="w-12 h-12 rounded-lg bg-white/10 overflow-hidden flex items-center justify-center text-white/30 flex-shrink-0">
                    <i class="fas fa-music"></i>
                </div>
                <div class="min-w-0 hidden sm:block">
                    <div id="miniTitle" class="font-semibold text-sm truncate">Select a track</div>
                    <div id="miniArtist" class="text-xs text-text-muted truncate">Tunecamp network</div>
                </div>
            </div>
            <div class="flex flex-col items-center flex-1">
                <div class="flex items-center gap-4 mb-1.5">
                    <button class="text-text-muted hover:text-white transition-colors" id="toggleShuffle" title="Shuffle"><i class="fas fa-random"></i></button>
                    <button class="text-text-muted hover:text-white transition-colors" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                    <button id="playBtn" class="w-11 h-11 rounded-full bg-gradient-to-r from-primary to-purple-500 flex items-center justify-center text-lg hover:scale-105 transition-transform"><i class="fas fa-play" id="playIcon"></i></button>
                    <button class="text-text-muted hover:text-white transition-colors" id="nextBtn"><i class="fas fa-step-forward"></i></button>
                    <button class="text-text-muted hover:text-white transition-colors" id="toggleRepeat" title="Repeat"><i class="fas fa-redo"></i></button>
                </div>
                <div class="w-full flex items-center gap-2">
                    <span id="currentTime" class="text-[11px] text-text-muted font-mono w-9 text-right">0:00</span>
                    <div id="progressBar" class="h-1.5 bg-white/20 rounded-full cursor-pointer relative overflow-hidden flex-1">
                        <div id="progressFill" class="absolute top-0 left-0 h-full bg-primary rounded-full" style="width:0%"></div>
                    </div>
                    <span id="duration" class="text-[11px] text-text-muted font-mono w-9">0:00</span>
                </div>
            </div>
            <div class="hidden md:flex items-center justify-end gap-3 w-1/3">
                <i class="fas fa-volume-up text-text-muted text-sm"></i>
                <input type="range" id="volumeSlider" class="w-24 h-1 bg-white/20 rounded-full appearance-none [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-3 [&::-webkit-slider-thumb]:h-3 [&::-webkit-slider-thumb]:bg-white [&::-webkit-slider-thumb]:rounded-full cursor-pointer" min="0" max="100" value="80">
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script type="module">
        let audio = new Audio();
        let allTracks = [];
        let filteredTracks = [];
        let currentTrackIndex = -1;
        let currentTrackKey = null;
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false;

        loadNetwork();
        initPlayer();

        function setStatus(state) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (state === 'live') { dot.style.background = '#10b981'; text.textContent = 'Network live'; }
            else if (state === 'connecting') { dot.style.background = '#f59e0b'; text.textContent = 'Connecting…'; }
            else { dot.style.background = '#ef4444'; text.textContent = 'Offline'; }
        }

        function initPlayer() {
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', updateDuration);
            audio.addEventListener('ended', () => { if (isRepeat) { audio.currentTime = 0; audio.play(); } else playNext(); });
            audio.addEventListener('play', () => { isPlaying = true; updatePlayButton(); });
            audio.addEventListener('pause', () => { isPlaying = false; updatePlayButton(); });
            audio.addEventListener('error', () => {
                isPlaying = false;
                updatePlayButton();
                const title = document.getElementById('miniTitle');
                if (title && !title.textContent.includes('—')) title.textContent += ' — unavailable';
            });
            document.getElementById('playBtn').addEventListener('click', togglePlay);
            document.getElementById('prevBtn').addEventListener('click', playPrev);
            document.getElementById('nextBtn').addEventListener('click', playNext);
            document.getElementById('toggleShuffle').addEventListener('click', (e) => { isShuffle = !isShuffle; e.currentTarget.style.color = isShuffle ? '#8b5cf6' : ''; });
            document.getElementById('toggleRepeat').addEventListener('click', (e) => { isRepeat = !isRepeat; e.currentTarget.style.color = isRepeat ? '#8b5cf6' : ''; });
            const vol = document.getElementById('volumeSlider');
            vol.addEventListener('input', (e) => { audio.volume = e.target.value / 100; });
            audio.volume = vol.value / 100;
            document.getElementById('progressBar').addEventListener('click', (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                if (audio.duration) audio.currentTime = audio.duration * percent;
            });
        }

        async function loadNetwork() {
            const tracksMap = new Map();
            const artistsSet = new Set();
            const genresSet = new Set();
            const sitesMap = new Map();
            const processedSites = new Set();

            const processSite = (siteData) => {
                const siteUrl = siteData.url ? siteData.url.replace(/\/$/, "") : null;
                if (!siteUrl || processedSites.has(siteUrl)) return;
                processedSites.add(siteUrl);
                const siteId = siteUrl;

                fetch(`${siteUrl}/api/catalog`, { headers: { 'Accept': 'application/json' } })
                .then(res => res.ok ? res.json() : Promise.reject())
                .then(catalog => {
                    sitesMap.set(siteId, { url: siteUrl, title: siteData.title || 'Tunecamp instance', coverImage: resolveCover(siteData.coverImage, siteUrl) });
                    renderInstances(sitesMap);

                    const process = (t, r) => {
                        if (t && (t.streamUrl || t.audioUrl || t.id)) {
                            const audioUrl = t.streamUrl || t.audioUrl || `${siteUrl}/api/tracks/${t.id}/stream`;
                            let cover = t.coverUrl || t.coverImage;
                            if (cover) { cover = resolveCover(cover, siteUrl); }
                            else if (r) {
                                const relCover = r.coverImage || r.cover_path;
                                if (relCover) {
                                    if (relCover.startsWith('http') || relCover.startsWith('data:') || relCover.startsWith('blob:')) cover = relCover;
                                    else if (relCover.includes('/') && !relCover.startsWith('/api/')) cover = `${siteUrl}/api/albums/${r.slug || r.id || r.title}/cover`;
                                    else cover = resolveCover(relCover, siteUrl);
                                }
                            }
                            if (!cover) cover = resolveCover(siteData.coverImage, siteUrl);
                            const td = {
                                id: t.id || t.title, title: t.title || "Untitled",
                                artistName: t.artistName || t.artist || (r ? (r.artistName || r.artist_name) : null) || siteData.title || "Unknown Artist",
                                releaseTitle: (r ? r.title : t.album) || "",
                                genre: (r ? r.genre : t.genre) || "",
                                coverUrl: cover, audioUrl: audioUrl, duration: t.duration || 0,
                                siteUrl: siteUrl, siteTitle: siteData.title || siteUrl,
                                addedAt: t.addedAt || (r ? (r.created_at || r.published_at) : null) || Date.now()
                            };
                            tracksMap.set(`${siteId}:${td.id}`, td);
                            artistsSet.add(td.artistName);
                            td.genre.split(',').map(s => s.trim()).filter(Boolean).forEach(g => genresSet.add(g));
                        }
                    };
                    if (Array.isArray(catalog.releases)) catalog.releases.forEach(r => { if (Array.isArray(r.tracks)) r.tracks.forEach(t => process(t, r)); });
                    if (Array.isArray(catalog.recentAlbums)) catalog.recentAlbums.forEach(r => { if (Array.isArray(r.tracks)) r.tracks.forEach(t => process(t, r)); });
                    if (Array.isArray(catalog.tracks)) catalog.tracks.forEach(t => process(t, null));
                    updateTracksList(tracksMap, artistsSet, genresSet);
                }).catch(() => {});
            };

            const directories = Array.isArray(window.TUNECAMP_DIRECTORY) ? window.TUNECAMP_DIRECTORY : [];
            if (directories.length === 0) { setStatus('offline'); return; }
            setStatus('connecting');
            let reached = 0;
            await Promise.all(directories.map(async (base) => {
                const origin = (base || '').replace(/\/$/, '');
                if (!origin) return;
                try {
                    const res = await fetch(`${origin}/api/community/sites`, { headers: { 'Accept': 'application/json' } });
                    if (!res.ok) return;
                    const sites = await res.json();
                    reached++;
                    (Array.isArray(sites) ? sites : []).forEach(s => processSite({ url: s.url, title: s.name || s.title, coverImage: s.coverImage }));
                } catch (err) {}
            }));
            setStatus(reached > 0 ? 'live' : 'offline');

            setTimeout(() => {
                if (allTracks.length === 0) {
                    document.getElementById('tracksGrid').innerHTML =
                        `<div class="col-span-full py-20 text-center text-text-muted"><i class="fas fa-music text-3xl text-white/20 mb-3"></i><p>No tracks found yet. Join the network!</p></div>`;
                }
            }, 5000);
        }

        function resolveCover(cover, siteUrl) {
            if (!cover) return cover;
            if (cover.startsWith('http') || cover.startsWith('data:') || cover.startsWith('blob:')) return cover;
            const path = cover.startsWith('/') ? cover : '/' + cover;
            return `${siteUrl}${path}`;
        }

        function renderInstances(sitesMap) {
            const sites = Array.from(sitesMap.values());
            const strip = document.getElementById('instancesStrip');
            if (sites.length === 0) return;
            strip.innerHTML = sites.map(s => {
                const cover = s.coverImage ? `<img src="${escapeHtml(s.coverImage)}" class="w-full h-full object-cover">` : '<i class="fas fa-compact-disc text-white/40"></i>';
                return `
                    <a href="${escapeHtml(s.url)}" target="_blank" class="shrink-0 w-40 group">
                        <div class="aspect-square w-full rounded-xl overflow-hidden bg-gradient-to-br from-primary/40 to-purple-800 flex items-center justify-center text-2xl border border-white/10 group-hover:border-primary/50 transition-all">${cover}</div>
                        <div class="mt-2 text-sm font-semibold truncate group-hover:text-primary transition-colors">${escapeHtml(s.title)}</div>
                    </a>`;
            }).join('');
        }

        function updateTracksList(tracksMap, artistsSet, genresSet) {
            const deduped = new Map();
            Array.from(tracksMap.values()).forEach(track => {
                const key = `${(track.title || '').toLowerCase()}::${(track.artistName || '').toLowerCase()}`;
                if (!deduped.has(key) || (track.addedAt || 0) > (deduped.get(key).addedAt || 0)) deduped.set(key, track);
            });
            allTracks = Array.from(deduped.values()).sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
            document.getElementById('trackCount').textContent = allTracks.length;

            const select = document.getElementById('artistFilter');
            const current = select.value;
            select.innerHTML = '<option value="" class="bg-bg-surface">All artists</option>';
            Array.from(artistsSet).sort().forEach(a => { select.innerHTML += `<option value="${escapeHtml(a)}" class="bg-bg-surface">${escapeHtml(a)}</option>`; });
            select.value = current;

            const gsel = document.getElementById('genreFilter');
            const gcurrent = gsel.value;
            gsel.innerHTML = '<option value="" class="bg-bg-surface">All genres</option>';
            Array.from(genresSet).sort().forEach(g => { gsel.innerHTML += `<option value="${escapeHtml(g)}" class="bg-bg-surface">${escapeHtml(g)}</option>`; });
            gsel.value = gcurrent;

            filterTracks();
        }

        function filterTracks() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const a = document.getElementById('artistFilter').value;
            const g = document.getElementById('genreFilter').value;
            filteredTracks = allTracks.filter(t => {
                const mq = !q || t.title.toLowerCase().includes(q) || (t.artistName && t.artistName.toLowerCase().includes(q)) || (t.releaseTitle && t.releaseTitle.toLowerCase().includes(q));
                const ma = !a || t.artistName === a;
                const mg = !g || t.genre.split(',').map(s => s.trim()).includes(g);
                return mq && ma && mg;
            });
            renderTracks();
        }

        function trackStableKey(t) {
            return `${t.siteUrl}::${t.id}`;
        }

        function renderTracks() {
            const grid = document.getElementById('tracksGrid');
            if (filteredTracks.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-text-muted">No tracks match your search.</div>`;
                return;
            }
            grid.innerHTML = filteredTracks.map((t) => {
                const key = trackStableKey(t);
                const active = key === currentTrackKey;
                const cover = t.coverUrl ? `<img src="${escapeHtml(t.coverUrl)}" class="w-full h-full object-cover">` : '<i class="fas fa-music"></i>';
                return `
                    <div class="track-tile ${active ? 'playing' : ''}" onclick="playTrackByKey('${escapeHtml(key)}')">
                        <div class="cover">
                            ${cover}
                            <div class="overlay absolute inset-0 bg-black/40 flex items-center justify-center text-2xl text-white">
                                <i class="fas ${active && isPlaying ? 'fa-pause' : 'fa-play'}"></i>
                            </div>
                        </div>
                        <div class="min-w-0">
                            <div class="text-sm font-semibold truncate">${escapeHtml(t.title)}</div>
                            <div class="text-xs text-text-muted truncate">${escapeHtml(t.artistName)}</div>
                            <div class="text-[11px] text-text-muted/50 truncate"><i class="fas fa-server mr-1"></i>${escapeHtml(t.siteTitle)}</div>
                        </div>
                    </div>`;
            }).join('');
        }

        function playTrackByKey(key) {
            const index = filteredTracks.findIndex(t => trackStableKey(t) === key);
            if (index === -1) {
                const globalIndex = allTracks.findIndex(t => trackStableKey(t) === key);
                if (globalIndex !== -1) {
                    filteredTracks = allTracks;
                    renderTracks();
                    playTrackIndex(filteredTracks.findIndex(t => trackStableKey(t) === key));
                }
                return;
            }
            playTrackIndex(index);
        }

        function playTrackIndex(index) {
            if (index < 0 || index >= filteredTracks.length) return;
            const track = filteredTracks[index];
            if (currentTrackKey === trackStableKey(track)) { togglePlay(); return; }
            currentTrackIndex = index;
            currentTrackKey = trackStableKey(track);
            audio.src = track.audioUrl;
            audio.play().catch((err) => {
                console.warn('Playback failed:', track.audioUrl, err);
                document.getElementById('miniTitle').textContent = track.title + ' — unavailable';
            });
            const coverHtml = track.coverUrl ? `<img src="${escapeHtml(track.coverUrl)}" class="w-full h-full object-cover">` : '<i class="fas fa-music"></i>';
            document.getElementById('miniCover').innerHTML = coverHtml;
            document.getElementById('miniTitle').textContent = track.title;
            document.getElementById('miniArtist').textContent = track.artistName;
            renderTracks();
        }

        function togglePlay() {
            if (currentTrackIndex === -1 && filteredTracks.length > 0) { playTrackIndex(0); return; }
            if (isPlaying) audio.pause(); else audio.play();
        }
        function updatePlayButton() {
            document.getElementById('playIcon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
            renderTracks();
        }
        function playNext() {
            if (filteredTracks.length === 0) return;
            let next = isShuffle ? Math.floor(Math.random() * filteredTracks.length) : currentTrackIndex + 1;
            if (next >= filteredTracks.length) next = 0;
            playTrackIndex(next);
        }
        function playPrev() {
            if (filteredTracks.length === 0) return;
            if (audio.currentTime > 3) { audio.currentTime = 0; return; }
            let prev = currentTrackIndex - 1;
            if (prev < 0) prev = filteredTracks.length - 1;
            playTrackIndex(prev);
        }
        window.shufflePlay = function () {
            isShuffle = true;
            document.getElementById('toggleShuffle').style.color = '#8b5cf6';
            if (filteredTracks.length > 0) playTrackIndex(Math.floor(Math.random() * filteredTracks.length));
        }
        function updateProgress() {
            if (!audio.duration) return;
            document.getElementById('progressFill').style.width = `${(audio.currentTime / audio.duration) * 100}%`;
            document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
        }
        function updateDuration() { document.getElementById('duration').textContent = formatTime(audio.duration); }
        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
        }
        function escapeHtml(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;') : ''; }

        window.filterTracks = filterTracks;
        window.playTrackIndex = playTrackIndex;
        window.playTrackByKey = playTrackByKey;
    </script>
</body>

</html>
