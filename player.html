<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunecamp Community Player - Listen to Independent Music</title>
    <meta name="description" content="Listen to music from independent artists using Tunecamp. A community player for the open TuneCamp federation.">
    <link rel="stylesheet" href="fonts/fonts.css" />
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css" />
    <script src="vendor/tailwind.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style type="text/tailwindcss">
        @theme {
            --color-primary: #8b5cf6;
            --color-primary-hover: #a78bfa;
            --color-bg-base: #050505;
            --color-bg-surface: #111111;
            --color-bg-surface-alt: #1a1a1a;
            --color-text-base: #ffffff;
            --color-text-muted: #a3a3a3;
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }
        body {
            @apply bg-bg-base text-text-base font-sans antialiased selection:bg-primary/30;
        }
        .glass-panel {
            @apply bg-white/5 backdrop-blur-2xl border border-white/10 shadow-[0_10px_40px_rgba(0,0,0,0.5)];
        }
        .ctrl-btn {
            @apply w-12 h-12 rounded-full flex items-center justify-center bg-white/5 hover:bg-white/15 transition-all text-white border border-white/5;
        }
        .ctrl-btn-play {
            @apply w-16 h-16 bg-gradient-to-r from-primary to-purple-500 hover:scale-105 border-none shadow-[0_0_20px_rgba(139,92,246,0.4)] text-2xl;
        }
        .track-row {
            @apply flex items-center p-3 gap-4 rounded-xl transition-all duration-300 hover:bg-white/5 cursor-pointer border border-transparent hover:border-white/5 focus-visible:outline-none focus-visible:bg-white/5 focus-visible:border-primary/50;
        }
        .track-row.playing {
            @apply bg-primary/10 border-primary/20;
        }
        .progress-bar {
            @apply h-1.5 bg-white/20 rounded-full cursor-pointer relative overflow-hidden flex-1;
        }
        .progress-fill {
            @apply absolute top-0 left-0 h-full bg-primary rounded-full;
        }
        /* Custom scrollbar for track list */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative lg:h-screen lg:overflow-hidden">
    <!-- Ambient Player Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/15 blur-[150px] rounded-full pointer-events-none -z-10" id="ambientGlow"></div>
    
    <!-- Top Header -->
    <header class="p-6 flex items-center justify-between z-10 bg-gradient-to-b from-black/80 to-transparent">
        <div class="flex items-center gap-4">
            <a href="index.html" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors text-text-muted hover:text-white" title="Back to Explore">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="font-display text-xl sm:text-2xl font-bold">Community Player</h1>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 px-3 py-1.5 bg-white/5 rounded-full border border-white/10 text-xs font-medium">
                <span id="statusDot" class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
                <span id="statusText" class="text-text-muted">Connecting...</span>
            </div>
            <div class="flex gap-4 text-sm font-mono text-text-muted/60">
                <div class="flex flex-col items-center">
                    <span id="trackCount" class="text-white font-bold">-</span>
                    <span class="text-[10px] uppercase tracking-wider">Tracks</span>
                </div>
            </div>
        </div>
    </header>

    <div class="flex-1 flex flex-col lg:flex-row overflow-y-auto lg:overflow-hidden max-w-[1600px] mx-auto w-full px-6 gap-8 pb-44 lg:pb-32">
        <!-- Main Player Area (Left) -->
        <div class="lg:w-1/2 flex flex-col justify-center items-center py-8 lg:py-0 lg:h-full relative">
            <div id="playerCover" class="w-[220px] h-[220px] sm:w-[300px] sm:h-[300px] md:w-[450px] md:h-[450px] rounded-3xl bg-white/5 border border-white/10 shadow-[0_30px_60px_rgba(0,0,0,0.6)] overflow-hidden flex items-center justify-center text-7xl text-white/20 transition-transform duration-500 relative z-10">
                <i class="fas fa-music"></i>
            </div>

            <div class="mt-8 md:mt-12 text-center max-w-lg w-full z-10">
                <h2 id="playerTitle" class="text-3xl md:text-4xl font-bold font-display mb-2 truncate">Select a track</h2>
                <p id="playerArtist" class="text-xl text-primary mb-1 truncate">Browse the tracks to start</p>
                <p id="playerRelease" class="text-sm text-text-muted truncate"></p>
            </div>
        </div>

        <!-- Track List (Right) -->
        <div class="lg:w-1/2 flex flex-col h-[60vh] lg:h-full glass-panel rounded-3xl overflow-hidden mt-2 lg:mt-0">
            <div class="p-6 border-b border-white/10 flex flex-col sm:flex-row gap-4 bg-black/20">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-text-muted"></i>
                    <input type="text" id="searchInput" placeholder="Search tracks or artists..." oninput="filterTracks()" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:border-primary/50 text-white placeholder-text-muted transition-colors">
                </div>
                <div class="flex gap-2">
                    <select id="artistFilter" onchange="filterTracks()" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-primary/50 text-white appearance-none pr-10 relative">
                        <option value="" class="bg-bg-surface text-white">All Artists</option>
                    </select>
                    <button onclick="shufflePlay()" class="bg-primary/20 text-primary border border-primary/30 rounded-xl px-5 hover:bg-primary/30 transition-colors" title="Shuffle Play">
                        <i class="fas fa-random"></i>
                    </button>
                </div>
            </div>

            <div id="tracksContainer" class="flex-1 overflow-y-auto p-4 flex flex-col gap-1">
                <div class="flex flex-col items-center justify-center h-full text-center p-8">
                    <i class="fas fa-circle-notch fa-spin text-4xl text-primary/50 mb-4"></i>
                    <p class="text-text-muted">Loading tracks from the community...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Control Bar -->
    <div class="fixed bottom-0 left-0 w-full glass-panel border-t border-white/10 border-l-0 border-r-0 border-b-0 rounded-none px-6 py-4 z-50">
        <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            
            <!-- Mini Info (Left) -->
            <div class="flex items-center gap-4 w-full md:w-1/3 min-w-0 hidden md:flex">
                <div id="miniCover" class="w-14 h-14 rounded-lg bg-white/10 overflow-hidden flex items-center justify-center text-white/30 text-xl flex-shrink-0">
                    <i class="fas fa-music"></i>
                </div>
                <div class="min-w-0">
                    <div id="miniTitle" class="font-bold text-sm truncate">No track selected</div>
                    <div id="miniArtist" class="text-xs text-text-muted truncate">Tunecamp Community</div>
                </div>
            </div>

            <!-- Controls (Center) -->
            <div class="flex flex-col items-center w-full md:w-1/3">
                <div class="flex items-center gap-6 mb-3">
                    <button class="text-text-muted hover:text-white transition-colors" title="Shuffle" id="toggleShuffle" aria-label="Shuffle"><i class="fas fa-random"></i></button>
                    <button class="ctrl-btn" id="prevBtn" aria-label="Previous track"><i class="fas fa-step-backward"></i></button>
                    <button class="ctrl-btn ctrl-btn-play" id="playBtn" aria-label="Play or pause (Space)" title="Play or pause (Space)"><i class="fas fa-play" id="playIcon"></i></button>
                    <button class="ctrl-btn" id="nextBtn" aria-label="Next track"><i class="fas fa-step-forward"></i></button>
                    <button class="text-text-muted hover:text-white transition-colors" title="Repeat" id="toggleRepeat" aria-label="Repeat"><i class="fas fa-redo"></i></button>
                </div>
                <div class="w-full flex items-center gap-3">
                    <span id="currentTime" class="text-xs text-text-muted font-mono w-10 text-right">0:00</span>
                    <div id="progressBar" class="progress-bar">
                        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                    </div>
                    <span id="duration" class="text-xs text-text-muted font-mono w-10">0:00</span>
                </div>
            </div>

            <!-- Volume/Extra (Right) -->
            <div class="flex items-center justify-end gap-4 w-full md:w-1/3 hidden md:flex">
                <i class="fas fa-volume-up text-text-muted text-sm"></i>
                <input type="range" id="volumeSlider" class="w-24 h-1 bg-white/20 rounded-full appearance-none [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-3 [&::-webkit-slider-thumb]:h-3 [&::-webkit-slider-thumb]:bg-white [&::-webkit-slider-thumb]:rounded-full cursor-pointer focus:outline-none" min="0" max="100" value="80">
            </div>
        </div>
    </div>

    <!-- Federated discovery over HTTP — no Zen, queries /api/community/sites -->
    <script src="config.js"></script>

    <script type="module">
        let audio = new Audio();
        let allTracks = [];
        let filteredTracks = [];
        let currentTrackIndex = -1;
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false;

        loadTracks();
        initPlayer();

        function setStatus(state) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (state === 'live') {
                dot.style.background = '#10b981';
                dot.style.boxShadow = '0 0 10px rgba(16, 185, 129, 0.8)';
                text.textContent = 'Network Live';
            } else if (state === 'connecting') {
                dot.style.background = '#f59e0b';
                dot.style.boxShadow = '0 0 10px rgba(245, 158, 11, 0.8)';
                text.textContent = 'Connecting...';
            } else {
                dot.style.background = '#ef4444';
                dot.style.boxShadow = '0 0 10px rgba(239, 68, 68, 0.8)';
                text.textContent = 'Offline';
            }
        }

        function initPlayer() {
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', updateDuration);
            audio.addEventListener('ended', () => {
                if(isRepeat) { audio.currentTime = 0; audio.play(); }
                else playNext();
            });
            audio.addEventListener('play', () => { isPlaying = true; updatePlayButton(); updateVisuals(); });
            audio.addEventListener('pause', () => { isPlaying = false; updatePlayButton(); updateVisuals(); });

            document.getElementById('playBtn').addEventListener('click', togglePlay);
            document.getElementById('prevBtn').addEventListener('click', playPrev);
            document.getElementById('nextBtn').addEventListener('click', playNext);

            document.getElementById('toggleShuffle').addEventListener('click', (e) => {
                isShuffle = !isShuffle;
                e.currentTarget.style.color = isShuffle ? '#8b5cf6' : '';
            });
            document.getElementById('toggleRepeat').addEventListener('click', (e) => {
                isRepeat = !isRepeat;
                e.currentTarget.style.color = isRepeat ? '#8b5cf6' : '';
            });

            const volumeSlider = document.getElementById('volumeSlider');
            volumeSlider.addEventListener('input', (e) => { audio.volume = e.target.value / 100; });
            audio.volume = volumeSlider.value / 100;

            document.getElementById('progressBar').addEventListener('click', (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                if (audio.duration) audio.currentTime = audio.duration * percent;
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.code === 'Space') {
                    const active = document.activeElement;
                    if (active) {
                        const tagName = active.tagName.toLowerCase();
                        const role = active.getAttribute('role');
                        if (['input', 'textarea', 'button', 'a', 'select'].includes(tagName) ||
                            ['button', 'link', 'menuitem', 'tab'].includes(role) ||
                            active.isContentEditable) {
                            return;
                        }
                    }
                    e.preventDefault();
                    togglePlay();
                }
            });
        }

        async function loadTracks() {
            const tracksMap = new Map();
            const artistsSet = new Set();
            const processedSites = new Set();

            const processSite = (siteData) => {
                const siteUrl = siteData.url ? siteData.url.replace(/\/$/, "") : null;
                if (!siteUrl || processedSites.has(siteUrl)) return;
                processedSites.add(siteUrl);
                const siteId = siteUrl;

                fetch(`${siteUrl}/api/catalog/full`, { headers: { 'Accept': 'application/json' } })
                .then(res => res.ok ? res.json() : Promise.reject())
                .then(catalog => {
                    const process = (t, r) => {
                        if(t && (t.streamUrl || t.audioUrl || t.id)) {
                            const audioUrl = t.streamUrl || t.audioUrl || `${siteUrl}/api/tracks/${t.id}/stream`;
                            
                            let cover = t.coverUrl || t.coverImage;
                            if (cover) {
                                if (!cover.startsWith('http') && !cover.startsWith('data:') && !cover.startsWith('blob:')) {
                                    const path = cover.startsWith('/') ? cover : '/' + cover;
                                    cover = `${siteUrl}${path}`;
                                }
                            } else if (r) {
                                const relCover = r.coverImage || r.cover_path;
                                if (relCover) {
                                    if (relCover.startsWith('http') || relCover.startsWith('data:') || relCover.startsWith('blob:')) {
                                        cover = relCover;
                                    } else {
                                        if (relCover.includes('/') && !relCover.startsWith('/api/')) {
                                            cover = `${siteUrl}/api/albums/${r.slug || r.id || r.title}/cover`;
                                        } else {
                                            const path = relCover.startsWith('/') ? relCover : '/' + relCover;
                                            cover = `${siteUrl}${path}`;
                                        }
                                    }
                                }
                            }
                            if (!cover) {
                                cover = siteData.coverImage;
                            }
                            if (cover && !cover.startsWith('http') && !cover.startsWith('data:') && !cover.startsWith('blob:')) {
                                const path = cover.startsWith('/') ? cover : '/' + cover;
                                cover = `${siteUrl}${path}`;
                            }

                            const td = {
                                id: t.id || t.title, title: t.title || "Untitled",
                                artistName: t.artistName || t.artist || (r ? (r.artistName || r.artist_name) : null) || siteData.title || "Unknown Artist",
                                releaseTitle: (r ? r.title : t.album) || "Unknown Release",
                                coverUrl: cover, audioUrl: audioUrl, duration: t.duration || 0,
                                siteUrl: siteUrl, addedAt: t.addedAt || (r ? (r.created_at || r.published_at) : null) || Date.now()
                            };
                            tracksMap.set(`${siteId}:${td.id}`, td);
                            artistsSet.add(td.artistName);
                        }
                    };
                    if (Array.isArray(catalog.releases)) catalog.releases.forEach(r => { if (Array.isArray(r.tracks)) r.tracks.forEach(t => process(t, r)); });
                    if (Array.isArray(catalog.recentAlbums)) catalog.recentAlbums.forEach(r => { if (Array.isArray(r.tracks)) r.tracks.forEach(t => process(t, r)); });
                    if (Array.isArray(catalog.tracks)) catalog.tracks.forEach(t => process(t, null));
                    updateTracksList(tracksMap, artistsSet);
                }).catch(()=>{});
            };

            const directories = Array.isArray(window.TUNECAMP_DIRECTORY) ? window.TUNECAMP_DIRECTORY : [];
            if (directories.length === 0) {
                setStatus('offline');
            } else {
                setStatus('connecting');
                let reached = 0;
                await Promise.all(directories.map(async (base) => {
                    const origin = (base || '').replace(/\/$/, '');
                    if (!origin) return;
                    try {
                        const res = await fetch(`${origin}/api/community/sites`, { headers: { 'Accept': 'application/json' } });
                        if (!res.ok) return;
                        const sites = await res.json();
                        reached++;
                        (Array.isArray(sites) ? sites : []).forEach(s => processSite({ url: s.url, title: s.name || s.title, coverImage: s.coverImage }));
                    } catch (err) {}
                }));
                setStatus(reached > 0 ? 'live' : 'offline');
            }

            setTimeout(() => {
                if (allTracks.length === 0) {
                    document.getElementById('tracksContainer').innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-center p-8">
                            <i class="fas fa-music text-4xl text-white/20 mb-4"></i>
                            <p class="text-text-muted">No tracks found yet. Join the network!</p>
                        </div>
                    `;
                }
            }, 5000);
        }

        function updateTracksList(tracksMap, artistsSet) {
            const deduped = new Map();
            Array.from(tracksMap.values()).forEach(track => {
                const key = `${(track.title || '').toLowerCase()}::${(track.artistName || '').toLowerCase()}`;
                if (!deduped.has(key) || (track.addedAt || 0) > (deduped.get(key).addedAt || 0)) deduped.set(key, track);
            });
            allTracks = Array.from(deduped.values()).sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
            document.getElementById('trackCount').textContent = allTracks.length;

            const select = document.getElementById('artistFilter');
            const current = select.value;
            select.innerHTML = '<option value="" class="bg-bg-surface text-white">All Artists</option>';
            Array.from(artistsSet).sort().forEach(a => {
                select.innerHTML += `<option value="${escapeHtml(a)}" class="bg-bg-surface text-white">${escapeHtml(a)}</option>`;
            });
            select.value = current;

            filterTracks();
        }

        function filterTracks() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const a = document.getElementById('artistFilter').value;
            filteredTracks = allTracks.filter(t => {
                const mq = !q || t.title.toLowerCase().includes(q) || (t.artistName && t.artistName.toLowerCase().includes(q));
                const ma = !a || t.artistName === a;
                return mq && ma;
            });
            renderTracks();
        }

        function renderTracks() {
            const container = document.getElementById('tracksContainer');
            if (filteredTracks.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-text-muted">No tracks match your search.</div>`;
                return;
            }

            // ⚡ Bolt Performance Optimization:
            // Added loading="lazy" to dynamically injected track cover images in the playlist.
            // Defers loading for offscreen covers in long playlists, improving main thread performance
            // and reducing network congestion during initial directory load.
            container.innerHTML = filteredTracks.map((t, i) => {
                const active = currentTrackIndex === i;
                const cover = t.coverUrl ? `<img src="${escapeHtml(t.coverUrl)}" class="w-full h-full object-cover" loading="lazy">` : '<i class="fas fa-music text-xs"></i>';
                const time = t.duration ? `${Math.floor(t.duration/60)}:${Math.floor(t.duration%60).toString().padStart(2,'0')}` : '';
                const escapedTitle = escapeHtml(t.title);
                const escapedArtist = escapeHtml(t.artistName);
                const ariaLabel = `Play ${escapedTitle} by ${escapedArtist}`;
                return `
                    <div class="track-row group ${active ? 'playing' : ''}" role="button" tabindex="0" aria-label="${ariaLabel}" onclick="playTrackIndex(${i})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();playTrackIndex(${i});}">
                        <div class="w-10 h-10 bg-white/10 rounded-lg overflow-hidden flex items-center justify-center text-white/50 relative flex-shrink-0">
                            ${cover}
                            <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center text-white text-xs">
                                <i class="fas ${active && isPlaying ? 'fa-pause' : 'fa-play'}"></i>
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-white font-medium truncate">${escapeHtml(t.title)}</div>
                            <div class="text-xs text-text-muted truncate">${escapeHtml(t.artistName)}</div>
                        </div>
                        <div class="text-xs text-text-muted/50 font-mono">${time}</div>
                    </div>
                `;
            }).join('');
        }

        function playTrackIndex(index) {
            if (index < 0 || index >= filteredTracks.length) return;
            const track = filteredTracks[index];
            if (currentTrackIndex === index) {
                togglePlay();
                return;
            }
            currentTrackIndex = index;
            audio.src = track.audioUrl;
            audio.play().catch(()=>{});
            
            // Update UI
            const coverHtml = track.coverUrl ? `<img src="${escapeHtml(track.coverUrl)}" class="w-full h-full object-cover shadow-2xl">` : '<i class="fas fa-music"></i>';
            document.getElementById('playerCover').innerHTML = coverHtml;
            document.getElementById('miniCover').innerHTML = coverHtml;
            document.getElementById('playerTitle').textContent = track.title;
            document.getElementById('miniTitle').textContent = track.title;
            document.getElementById('playerArtist').textContent = track.artistName;
            document.getElementById('miniArtist').textContent = track.artistName;
            document.getElementById('playerRelease').textContent = track.releaseTitle || '';
            
            // Extract colors for ambient glow (simplified pseudo-random based on title)
            const colors = ['#8b5cf6', '#ec4899', '#3b82f6', '#10b981', '#f59e0b'];
            const cIdx = track.title.length % colors.length;
            document.getElementById('ambientGlow').style.backgroundColor = colors[cIdx];

            renderTracks();
        }

        function togglePlay() {
            if (currentTrackIndex === -1 && filteredTracks.length > 0) { playTrackIndex(0); return; }
            if (isPlaying) audio.pause(); else audio.play();
        }

        function updatePlayButton() {
            document.getElementById('playIcon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
            renderTracks(); // Update the tiny icon in the list too
        }

        function updateVisuals() {
            const cover = document.getElementById('playerCover');
            if (isPlaying) {
                cover.style.transform = 'scale(1.05)';
            } else {
                cover.style.transform = 'scale(1)';
            }
        }

        function playNext() {
            if (filteredTracks.length === 0) return;
            let next = currentTrackIndex + 1;
            if (isShuffle) next = Math.floor(Math.random() * filteredTracks.length);
            if (next >= filteredTracks.length) next = 0;
            playTrackIndex(next);
        }

        function playPrev() {
            if (filteredTracks.length === 0) return;
            let prev = currentTrackIndex - 1;
            if (audio.currentTime > 3) { audio.currentTime = 0; return; }
            if (prev < 0) prev = filteredTracks.length - 1;
            playTrackIndex(prev);
        }

        window.shufflePlay = function() {
            isShuffle = true;
            document.getElementById('toggleShuffle').style.color = '#8b5cf6';
            if(filteredTracks.length > 0) playTrackIndex(Math.floor(Math.random() * filteredTracks.length));
        }

        function updateProgress() {
            if (!audio.duration) return;
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = `${p}%`;
            document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
        }

        function updateDuration() {
            document.getElementById('duration').textContent = formatTime(audio.duration);
        }

        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const se = Math.floor(s % 60);
            return `${m}:${se.toString().padStart(2,'0')}`;
        }
        function escapeHtml(s) { return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'):''; }
        
        window.filterTracks = filterTracks;
        window.playTrackIndex = playTrackIndex;
    </script>
